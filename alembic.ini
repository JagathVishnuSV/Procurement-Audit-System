# alembic.ini
# ─────────────────────────────────────────────────────────────────────────────
# Alembic configuration file.
#
# The actual database connection URL is NOT hardcoded here.
# It is injected programmatically by alembic/env.py, which reads
# from the `Settings` class (backend/config.py).
#
# Usage:
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#   alembic downgrade -1
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
# Alembic will look for migration scripts here
script_location = alembic

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Leave sqlalchemy.url blank – it is set dynamically in alembic/env.py
sqlalchemy.url =

# Timezone for file timestamps
timezone = UTC

# Maximum length of revision slugs in filenames
truncate_slug_length = 60

# ── Logging ────────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

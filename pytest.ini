[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# pytest configuration
# ─────────────────────────────────────────────────────────────────────────────
testpaths = tests
asyncio_mode = auto

# Custom markers
markers =
    unit: Fast unit tests with no external dependencies
    integration: Tests that require PostgreSQL + Redis + Redpanda (via Docker)
    slow: Tests that take > 5 seconds

# Filter specific warnings
filterwarnings =
    ignore::DeprecationWarning:aiokafka
    ignore::DeprecationWarning:sqlalchemy

# Default: skip integration tests unless explicitly requested
addopts = -v --strict-markers -m "not integration"
